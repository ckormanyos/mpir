name: mpir
on:
  push:
    branches:
      - '**'
  pull_request:
jobs:
  msvc-lib_mpir_core2-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: clone-boost-develop
        working-directory: ${{ runner.workspace }}
        run: |
          git clone -b develop --depth 1 https://github.com/boostorg/boost.git ${{ runner.workspace }}/boost-root
      - name: clone-boost-submods
        working-directory: ${{ runner.workspace }}/boost-root
        run: |
          git submodule update --init tools
          git submodule update --init libs/config
          git submodule update --init libs/multiprecision
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.4
      - name: bootstrap-boost
        working-directory: ${{ runner.workspace }}/boost-root
        run: |
          ./bootstrap.bat
          ./b2 headers
      - name: msvc-lib_mpir_core2-x64
        shell: cmd
        working-directory: ./
        run: |
          cd build.vc17
          curl https://github.com/yasm/yasm/releases/download/v1.3.0/yasm-1.3.0-win64.exe
          del /Q yasm.exe
          copy yasm-1.3.0-win64.exe yasm.exe
          cd ..\build.vc17
          echo "Get YASM version"
          ..\build.vc\yasm\1.3.0\yasm.exe --version
          set INCLUDE=${{ runner.workspace }}\boost-root
          set INCLUDE=${{ runner.workspace }}\lib\x64\Release;%INCLUDE%
          MSBuild -m mpir.sln -p:useenv=true -p:Configuration=Release -p:Platform=x64 /t:Rebuild
          dir ${{ runner.workspace }}\lib\x64\Release
          dir %cd%\_Out\test_with_boost.exe
          %cd%\_Out\test_with_boost.exe
